name: Build and push worker images

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - ".github/workflows/build-images.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: video-gen
            dockerfile: workers/video_gen/Dockerfile
          - name: tts
            dockerfile: workers/tts/Dockerfile
          - name: bg-audio
            dockerfile: workers/bg_audio/Dockerfile
          - name: lip-sync
            dockerfile: workers/lip_sync/Dockerfile
          - name: assembly
            dockerfile: workers/assembly/Dockerfile
    steps:
      - uses: actions/checkout@v4

      # lip-sync bakes in several GB of model weights — GitHub's standard
      # runners start with ~14GB free after the OS; this reclaims space taken
      # by preinstalled toolchains we don't need (Android SDK, .NET, etc).
      - name: Free up disk space
        if: matrix.name == 'lip-sync'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/hel-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
